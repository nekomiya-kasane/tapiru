<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>tapiru — Terminal UI in the Browser</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1e1e2e;
    color: #cdd6f4;
    font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  h1 {
    font-size: 1.2rem;
    color: #89b4fa;
    margin-bottom: 8px;
    letter-spacing: 0.05em;
  }
  #tapiru-terminal {
    width: 80ch;
    height: 24em;
    background: #11111b;
    border: 1px solid #313244;
    border-radius: 8px;
    padding: 4px 8px;
    font-size: 16px;
    line-height: 1.2;
    overflow: hidden;
    white-space: pre;
    outline: none;
    cursor: text;
    tab-index: 0;
  }
  #tapiru-terminal:focus {
    border-color: #89b4fa;
    box-shadow: 0 0 0 2px rgba(137, 180, 250, 0.25);
  }
  #status {
    margin-top: 8px;
    font-size: 0.85rem;
    color: #6c7086;
  }
  /* ANSI color classes — generated by the JS ANSI parser */
  .ansi-bold { font-weight: bold; }
  .ansi-dim { opacity: 0.6; }
  .ansi-italic { font-style: italic; }
  .ansi-underline { text-decoration: underline; }
  .ansi-strike { text-decoration: line-through; }
  .ansi-reverse { filter: invert(1); }
</style>
</head>
<body>
  <h1>tapiru terminal</h1>
  <div id="tapiru-terminal" tabindex="0"></div>
  <div id="status">Loading WASM…</div>

  <script>
    // ── Minimal ANSI-to-HTML converter ──────────────────────────────────
    // Handles SGR sequences (colors, bold, etc.) and cursor positioning.
    var AnsiParser = {
      // Convert raw ANSI text to HTML spans
      toHTML: function(text) {
        var out = '';
        var fg = null, bg = null;
        var bold = false, dim = false, italic = false, underline = false;
        var i = 0;
        while (i < text.length) {
          if (text[i] === '\x1b' && text[i+1] === '[') {
            // Parse CSI sequence
            var j = i + 2;
            while (j < text.length && text[j] !== 'm' && text[j] !== 'H' &&
                   text[j] !== 'J' && text[j] !== 'K' && text[j] !== 'h' &&
                   text[j] !== 'l' && text[j] !== 'A' && text[j] !== 'B') {
              j++;
            }
            if (j < text.length) {
              var seq = text.substring(i+2, j);
              var cmd = text[j];
              if (cmd === 'm') {
                // SGR
                var parts = seq.split(';');
                var k = 0;
                while (k < parts.length) {
                  var n = parseInt(parts[k]) || 0;
                  if (n === 0) { fg = null; bg = null; bold = false; dim = false; italic = false; underline = false; }
                  else if (n === 1) bold = true;
                  else if (n === 2) dim = true;
                  else if (n === 3) italic = true;
                  else if (n === 4) underline = true;
                  else if (n === 38 && parts[k+1] === '2') {
                    fg = 'rgb(' + parts[k+2] + ',' + parts[k+3] + ',' + parts[k+4] + ')';
                    k += 4;
                  }
                  else if (n === 48 && parts[k+1] === '2') {
                    bg = 'rgb(' + parts[k+2] + ',' + parts[k+3] + ',' + parts[k+4] + ')';
                    k += 4;
                  }
                  k++;
                }
              }
              // Skip other CSI sequences (cursor movement, clear, etc.)
              i = j + 1;
              continue;
            }
          }
          // Regular character
          var ch = text[i];
          if (ch === '<') ch = '&lt;';
          else if (ch === '>') ch = '&gt;';
          else if (ch === '&') ch = '&amp;';

          var style = '';
          if (fg) style += 'color:' + fg + ';';
          if (bg) style += 'background:' + bg + ';';
          if (bold) style += 'font-weight:bold;';
          if (dim) style += 'opacity:0.6;';
          if (italic) style += 'font-style:italic;';
          if (underline) style += 'text-decoration:underline;';

          if (style) {
            out += '<span style="' + style + '">' + ch + '</span>';
          } else {
            out += ch;
          }
          i++;
        }
        return out;
      }
    };

    // ── Output capture ──────────────────────────────────────────────────
    // tapiru writes ANSI to stdout; we intercept and render to DOM.
    var termEl = document.getElementById('tapiru-terminal');
    var outputBuffer = '';

    var Module = {
      print: function(text) {
        outputBuffer += text + '\n';
        termEl.innerHTML = AnsiParser.toHTML(outputBuffer);
      },
      printErr: function(text) {
        console.error('[tapiru]', text);
      },
      onRuntimeInitialized: function() {
        document.getElementById('status').textContent = 'Ready — click terminal to focus';
        termEl.focus();
      }
    };

    // Focus terminal on click
    termEl.addEventListener('click', function() { termEl.focus(); });
  </script>

  {{{ SCRIPT }}}
</body>
</html>
